<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thyself — an AI that actually knows you</title>
  <meta name="description" content="An AI that actually knows you so that you can know yourself.">
  <meta property="og:title" content="know THYSELF">
  <meta property="og:description" content="An AI that actually knows you so that you can know yourself.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thyself.fyi">
  <meta property="og:image" content="https://thyself.fyi/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://thyself.fyi/og-image.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .halo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.08) 0%,
        rgba(255, 255, 255, 0.04) 25%,
        rgba(255, 255, 255, 0.015) 45%,
        rgba(255, 255, 255, 0.005) 65%,
        transparent 80%
      );
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }

    .halo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0.05) 40%,
        transparent 70%
      );
      animation: glow-pulse 6s ease-in-out infinite;
    }

    .halo::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.04) 0%,
        rgba(255, 255, 255, 0.02) 35%,
        transparent 65%
      );
      animation: glow-drift 12s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      40% { opacity: 0.65; transform: translate(-50%, -50%) scale(1.06); }
      60% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
      80% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.04); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    @keyframes glow-drift {
      0%, 100% { filter: blur(0px); opacity: 0.35; }
      33% { filter: blur(2px); opacity: 0.55; }
      66% { filter: blur(1px); opacity: 0.4; }
    }

    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.25rem;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1.5rem;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 255, 255, 0.7) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.4);
      max-width: 400px;
      margin: 0 auto 3rem;
      line-height: 1.6;
    }

    .download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.03);
    }

    .download:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.06);
    }

    .download svg {
      width: 16px;
      height: 16px;
      opacity: 0.6;
    }

    .download:hover svg {
      opacity: 1;
    }

    .github-link {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255, 255, 255, 0.25);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      transition: color 0.4s ease;
      z-index: 2;
    }

    .github-link:hover {
      color: rgba(255, 255, 255, 0.6);
    }

    .github-link svg {
      width: 13px;
      height: 13px;
    }

    @media (max-width: 480px) {
      .halo {
        width: 350px;
        height: 350px;
      }
      .halo::after {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="halo"></div>
  <div class="container">
    <p class="title">know</p>
    <h1 class="brand">Thyself</h1>
    <p class="subtitle">an AI that actually knows you<br>so that you can know yourself</p>
    <a href="#" id="download-btn" class="download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2Z"/>
        <path d="M12 8v8m0 0l-3-3m3 3l3-3"/>
      </svg>
      <span id="download-label">download for mac</span>
    </a>
  </div>
  <a href="https://github.com/jfru/thyself?tab=contributing-ov-file#the-model" target="_blank" rel="noopener" class="github-link">
    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
      <path d="M12 .3a12 12 0 00-3.8 23.38c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.08-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.31-5.47-1.34-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 016.02 0c2.28-1.55 3.29-1.23 3.29-1.23.64 1.66.24 2.88.12 3.18a4.65 4.65 0 011.23 3.22c0 4.61-2.8 5.62-5.48 5.92.42.36.81 1.1.81 2.22v3.29c0 .32.2.7.82.58A12 12 0 0012 .3"/>
    </svg>
    contribute on github
  </a>
  <script>
    document.getElementById('download-btn').addEventListener('click', async function(e) {
      e.preventDefault();
      var label = document.getElementById('download-label');
      var ua = navigator.userAgent || '';
      if (/iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
        label.textContent = 'thyself requires a mac';
        setTimeout(function() { label.textContent = 'download for mac'; }, 3000);
        return;
      }
      label.textContent = 'fetching latest build\u2026';
      try {
        var res = await fetch('https://api.github.com/repos/jfru/thyself/releases/latest');
        if (!res.ok) throw new Error(res.status);
        var release = await res.json();
        var dmg = release.assets.find(function(a) { return a.name.endsWith('.dmg'); });
        if (dmg) {
          window.location.href = dmg.browser_download_url;
          label.textContent = 'downloading\u2026';
        } else {
          window.location.href = 'https://github.com/jfru/thyself/releases/latest';
        }
      } catch (_) {
        window.location.href = 'https://github.com/jfru/thyself/releases/latest';
      }
    });
  </script>
</body>
</html>
