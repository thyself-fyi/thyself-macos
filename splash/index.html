<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thyself — an AI that actually knows you</title>
  <meta name="description" content="An AI that actually knows you so that you can know yourself.">
  <meta property="og:title" content="know THYSELF">
  <meta property="og:description" content="An AI that actually knows you so that you can know yourself.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thyself.fyi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .halo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.08) 0%,
        rgba(255, 255, 255, 0.04) 25%,
        rgba(255, 255, 255, 0.015) 45%,
        rgba(255, 255, 255, 0.005) 65%,
        transparent 80%
      );
      pointer-events: none;
      animation: breathe 8s ease-in-out infinite;
    }

    .halo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.12) 0%,
        rgba(255, 255, 255, 0.05) 40%,
        transparent 70%
      );
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.08); }
    }

    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.25rem;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 1.5rem;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 255, 255, 0.7) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.4);
      max-width: 400px;
      margin: 0 auto 3rem;
      line-height: 1.6;
    }

    .download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.03);
    }

    .download:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.06);
    }

    .download svg {
      width: 16px;
      height: 16px;
      opacity: 0.6;
    }

    .download:hover svg {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .halo {
        width: 350px;
        height: 350px;
      }
      .halo::after {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="halo"></div>
  <div class="container">
    <p class="title">know</p>
    <h1 class="brand">Thyself</h1>
    <p class="subtitle">an AI that actually knows you<br>so that you can know yourself</p>
    <a href="#" id="download-btn" class="download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2Z"/>
        <path d="M12 8v8m0 0l-3-3m3 3l3-3"/>
      </svg>
      <span id="download-label">download for mac</span>
    </a>
  </div>
  <script>
    document.getElementById('download-btn').addEventListener('click', async function(e) {
      e.preventDefault();
      var label = document.getElementById('download-label');
      label.textContent = 'fetching latest build\u2026';
      try {
        var res = await fetch('https://api.github.com/repos/jfru/thyself/releases/latest');
        if (!res.ok) throw new Error(res.status);
        var release = await res.json();
        var dmg = release.assets.find(function(a) { return a.name.endsWith('.dmg'); });
        if (dmg) {
          window.location.href = dmg.browser_download_url;
          label.textContent = 'downloading\u2026';
        } else {
          window.location.href = 'https://github.com/jfru/thyself/releases/latest';
        }
      } catch (_) {
        window.location.href = 'https://github.com/jfru/thyself/releases/latest';
      }
    });
  </script>
</body>
</html>
